<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKTFLOW | Frozen Configs</title>
    <!-- Библиотека для QR -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --cold-blue: #00d4ff; --ice-white: #e0f7fa; --dark-depth: #050a14; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at center, #0a192f 0%, var(--dark-depth) 100%);
            color: var(--ice-white); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        #snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; z-index: 1; }
        
        h1 { 
            color: var(--ice-white); 
            font-size: 2.8em; 
            margin-bottom: 5px; 
            text-shadow: 0 0 15px var(--cold-blue);
            letter-spacing: 2px;
            text-align: center;
        }

        .status { text-align: center; font-size: 0.85em; color: var(--cold-blue); margin-bottom: 30px; opacity: 0.8; }

        .card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(0, 212, 255, 0.2); 
            transition: 0.4s;
        }

        .card:hover { border-color: var(--cold-blue); box-shadow: 0 0 25px rgba(0, 212, 255, 0.2); }
        h2 { margin: 0 0 10px 0; font-size: 1.4em; display: flex; align-items: center; gap: 10px; }
        .count { color: var(--cold-blue); font-weight: bold; margin-bottom: 15px; font-size: 0.85em; text-transform: uppercase; }

        .url-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 12px; 
            border-radius: 12px; 
            font-family: monospace; 
            font-size: 0.7em; 
            word-break: break-all; 
            color: #6a8caf; 
            margin-bottom: 15px; 
            border: 1px solid rgba(0, 212, 255, 0.1); 
        }

        .btn { 
            background: linear-gradient(135deg, #00d4ff 0%, #0077ff 100%);
            color: white; border: none; padding: 14px; border-radius: 12px; 
            cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; 
            box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3);
        }

        .qr-area { background: #fff; padding: 12px; margin-top: 20px; border-radius: 16px; display: inline-block; border: 4px solid var(--ice-white); }
    </style>
</head>
<body>

    <canvas id="snow"></canvas>

    <div class="container">
        <h1>YKTFLOW</h1>
        <p class="status">❄️ Замороженные конфиги • Обновлено: каждые 4ч</p>

        <!-- WIFI -->
        <div class="card">
            <h2>🧊 WIFI Subscription</h2>
            <div id="count-wifi" class="count">Чекаем лед...</div>
            <div class="url-box" id="url-wifi">https://githubusercontent.com</div>
            <button class="btn" onclick="copy('url-wifi', this)">СКОПИРОВАТЬ ССЫЛКУ</button>
            <center><div id="qr-wifi" class="qr-area"></div></center>
        </div>

        <!-- MOBILE -->
        <div class="card">
            <h2>📱 Mobile Net</h2>
            <div id="count-mobile" class="count">Чекаем лед...</div>
            <div class="url-box" id="url-mobile">https://githubusercontent.com</div>
            <button class="btn" onclick="copy('url-mobile', this)">СКОПИРОВАТЬ ССЫЛКУ</button>
            <center><div id="qr-mobile" class="qr-area"></div></center>
        </div>
    </div>

    <script>
        // Анимация снега
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function initSnow() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            snowflakes = Array(150).fill().map(() => ({
                x: Math.random() * width, y: Math.random() * height,
                r: Math.random() * 3 + 1, d: Math.random() * 1
            }));
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            snowflakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); });
            ctx.fill();
            updateSnow();
        }

        function updateSnow() {
            snowflakes.forEach(f => {
                f.y += Math.cos(f.d) + 1 + f.r / 2; f.x += Math.sin(f.d) * 2;
                if (f.y > height) { f.y = -10; f.x = Math.random() * width; }
            });
            requestAnimationFrame(drawSnow);
        }

        window.onresize = initSnow;
        initSnow(); drawSnow();

        function copy(id, btn) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const oldText = btn.innerText;
            btn.innerText = "ГОТОВО, ЗАМЕРЗЛО!";
            setTimeout(() => { btn.innerText = oldText; }, 2000);
        }

        // Счетчик узлов для обычного текста
        async function loadStats(id, file) {
            try {
                const res = await fetch(`https://githubusercontent.com{file}`);
                const text = await res.text();
                // Считаем строки, где есть конфиг (://)
                const count = text.split('\n').filter(l => l.includes('://')).length;
                document.getElementById('count-' + id).innerText = `ДОСТУПНО УЗЛОВ: ${count}`;
            } catch (e) {
                document.getElementById('count-' + id).innerText = `ОБНОВЛЕНИЕ...`;
            }
        }

        const urlW = document.getElementById("url-wifi").innerText;
        const urlM = document.getElementById("url-mobile").innerText;
        
        new QRCode(document.getElementById("qr-wifi"), { text: urlW, width: 160, height: 160 });
        new QRCode(document.getElementById("qr-mobile"), { text: urlM, width: 160, height: 160 });

        loadStats('wifi', 'kudryash0vv_YKTFLOW_1.txt');
        loadStats('mobile', 'kudryash0vv_YKTFLOW_mobile.txt');
    </script>
</body>
</html>

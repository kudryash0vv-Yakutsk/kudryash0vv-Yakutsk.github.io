<script>
    // Ждем полной загрузки HTML, чтобы не было ошибки "getContext"
    window.addEventListener('DOMContentLoaded', () => {
        
        // --- СНЕГ ---
        const canvas = document.getElementById('snow');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function initSnow() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            snowflakes = Array(150).fill().map(() => ({
                x: Math.random() * width, y: Math.random() * height,
                r: Math.random() * 3 + 1, d: Math.random() * 1
            }));
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            snowflakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); });
            ctx.fill();
            updateSnow();
        }

        function updateSnow() {
            snowflakes.forEach(f => {
                f.y += Math.cos(f.d) + 1 + f.r / 2; f.x += Math.sin(f.d) * 2;
                if (f.y > height) { f.y = -10; f.x = Math.random() * width; }
            });
            requestAnimationFrame(drawSnow);
        }

        window.onresize = initSnow;
        initSnow();
        drawSnow();

        // Генерим QR и запускаем статку
        const urlW = document.getElementById("url-wifi").innerText;
        const urlM = document.getElementById("url-mobile").innerText;
        
        new QRCode(document.getElementById("qr-wifi"), { text: urlW, width: 160, height: 160 });
        new QRCode(document.getElementById("qr-mobile"), { text: urlM, width: 160, height: 160 });

        loadStats('wifi', 'kudryash0vv_YKTFLOW_1.txt');
        loadStats('mobile', 'kudryash0vv_YKTFLOW_mobile.txt');
    });

    // --- ФУНКЦИОНАЛ ВНЕ ЗАГРУЗКИ ---
    function copy(id, btn) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        const oldText = btn.innerText;
        btn.innerText = "ГОТОВО, ЗАМЕРЗЛО!";
        setTimeout(() => { btn.innerText = oldText; }, 2000);
    }

    async function loadStats(id, file) {
        try {
            // УДАЛИ ПРОБЕЛЫ В ССЫЛКЕ НИЖЕ
            const url = "https:// raw.githubusercontent.com/kudryash0vv/kudryash0vv.YKTFLOW/main/configs/" + file;
            
            const res = await fetch(url);
            let text = await res.text();
            
            if (!text.trim().startsWith("vless") && !text.trim().startsWith("profile") && !text.trim().startsWith("ss")) {
                text = atob(text.trim());
            }

            const count = text.split('\n').filter(l => l.includes('://')).length;
            document.getElementById('count-' + id).innerText = `ДОСТУПНО УЗЛОВ: ${count}`;
        } catch (e) {
            console.error(e);
            document.getElementById('count-' + id).innerText = `ОБНОВЛЕНИЕ...`;
        }
    }
</script>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // --- 1. СНЕГ ---
        const canvas = document.getElementById('snow');
        if (!canvas) {
            console.warn("⚠️ Холст #snow не найден.");
        } else {
            const ctx = canvas.getContext('2d');
            let width, height, snowflakes = [];
            function initSnow() {
                width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
                snowflakes = Array(150).fill().map(() => ({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 3 + 1, d: Math.random() * 1 }));
            }
            function drawSnow() {
                ctx.clearRect(0, 0, width, height); ctx.fillStyle = 'white'; ctx.beginPath();
                snowflakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); });
                ctx.fill(); updateSnow();
            }
            function updateSnow() {
                snowflakes.forEach(f => { f.y += Math.cos(f.d) + 1 + f.r / 2; f.x += Math.sin(f.d) * 2; if (f.y > height) { f.y = -10; f.x = Math.random() * width; } });
                requestAnimationFrame(drawSnow);
            }
            window.onresize = initSnow; initSnow(); drawSnow();
        }

        // --- 2. QR И СТАТИСТИКА (С ЗАЩИТОЙ) ---
        const wifiBox = document.getElementById("url-wifi");
        const mobileBox = document.getElementById("url-mobile");

        if (wifiBox && mobileBox) {
            const urlW = wifiBox.innerText.trim();
            const urlM = mobileBox.innerText.trim();
            
            new QRCode(document.getElementById("qr-wifi"), { text: urlW, width: 160, height: 160 });
            new QRCode(document.getElementById("qr-mobile"), { text: urlM, width: 160, height: 160 });

            loadStats('wifi', 'kudryash0vv_YKTFLOW_1.txt');
            loadStats('mobile', 'kudryash0vv_YKTFLOW_mobile.txt');
        } else {
            console.error("❌ Не найдены блоки url-wifi или url-mobile!");
        }
    });

    // --- 3. ФУНКЦИИ ---
    function copy(id, btn) {
        const el = document.getElementById(id);
        if (el) {
            navigator.clipboard.writeText(el.innerText);
            btn.innerText = "ГОТОВО!";
            setTimeout(() => { btn.innerText = "СКОПИРОВАТЬ"; }, 2000);
        }
    }

    async function loadStats(id, file) {
        try {
            // УДАЛИ ПРОБЕЛЫ В ССЫЛКЕ
            const url = "https://raw.githubusercontent.comkudryash0vv/kudryash0vv.YKTFLOW/main/configs/" + file;
            const res = await fetch(url);
            let text = await res.text();
            
            if (!text.trim().startsWith("vless") && !text.trim().startsWith("profile") && !text.trim().startsWith("ss")) {
                text = atob(text.trim());
            }

            const count = text.split('\n').filter(l => l.includes('://')).length;
            const countEl = document.getElementById('count-' + id);
            if (countEl) countEl.innerText = `ДОСТУПНО УЗЛОВ: ${count}`;
        } catch (e) {
            document.getElementById('count-' + id).innerText = `ОБНОВЛЕНИЕ...`;
        }
    }
</script>

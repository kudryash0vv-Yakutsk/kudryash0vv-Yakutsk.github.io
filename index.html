<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKTFLOW | Free Xray</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --main: #00ff88; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        h1 { color: var(--main); font-size: 2.5em; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .status { font-size: 0.9em; color: #888; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--main); box-shadow: 0 0 30px rgba(0,255,136,0.1); }
        h2 { margin: 0 0 10px 0; font-size: 1.5em; }
        .count { color: var(--main); font-weight: bold; margin-bottom: 15px; font-size: 0.9em; }
        .url-box { background: #000; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 0.75em; word-break: break-all; color: #666; margin-bottom: 15px; border: 1px solid #111; }
        .btn { background: var(--main); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .qr-area { background: #fff; padding: 15px; margin-top: 20px; border-radius: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <h1>YKTFLOW</h1>
        <p class="status">Автоматическая фильтрация каждые 4 часа</p>

        <!-- Мобильная подписка -->
        <div class="card">
            <h2>📱 Mobile Net</h2>
            <div id="count-mobile" class="count">Проверка узлов...</div>
            <div class="url-box" id="url-mobile">https://githubusercontent.com</div>
            <button class="btn" onclick="copy('url-mobile')">Копировать подписку</button>
            <center><div id="qr-mobile" class="qr-area"></div></center>
        </div>

        <p style="color: #444; font-size: 0.8em;">Добавьте ссылку в v2rayNG, Nekobox или Streisand</p>
    </div>

    <script>
        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const btn = event.target;
            btn.innerText = "СКОПИРОВАНО!";
            btn.style.background = "#fff";
            setTimeout(() => { btn.innerText = "Копировать подписку"; btn.style.background = "#00ff88"; }, 2000);
        }

        async function init() {
            const url = document.getElementById("url-mobile").innerText;
            
            // QR Code
            new QRCode(document.getElementById("qr-mobile"), { text: url, width: 180, height: 180, colorDark: "#000000", colorLight: "#ffffff" });

            // Счетчик
            try {
                const res = await fetch(url);
                const text = await res.text();
                const num = text.split('\n').filter(l => l.trim().length > 0).length;
                document.getElementById("count-mobile").innerText = `Активных конфигов: ${num}`;
            } catch (e) {
                document.getElementById("count-mobile").innerText = `Сервис обновляется...`;
            }
        }
        init();
    </script>
</body>
</html>
